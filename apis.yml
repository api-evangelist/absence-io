description: >-
  Absence.io is an innovative and efficient leave management software that simplifies
  the process of tracking and managing employee absences. It provides a centralized
  platform for both employees and managers to easily request, approve, and track time-off
  requests. Absence.io helps streamline communication and ensure transparency within
  an organization by providing real-time updates on employee availability and leave
  balances. The REST API v2 allows integration with absences, users, allowances,
  departments, locations, reason types, and timespans using Hawk authentication.
created: '2025-02-17'
modified: '2026-04-19'
