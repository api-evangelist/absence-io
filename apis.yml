      - type: JSONSchema
        url: json-schema/user-schema.json
        title: User Schema
      - type: JSONSchema
        url: json-schema/allowance-schema.json
        title: Allowance Schema
    description: >-
      Absence.io REST API v2 allows seamless integration of absence management features
      into software applications. Retrieve, create, update, and delete records for absences,
      users, allowances, departments, locations, reason types, and timespans. All requests
      and responses use JSON format with Hawk authentication.
common:
  - type: Pricing
